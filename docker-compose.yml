services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    image: ucar-frontend:latest
    container_name: ucar-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
